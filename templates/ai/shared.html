{% load static %}
<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ session.title|default:"Iqtidor AI Suhbati" }}</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'assets/favicon-32.png' %}"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#111113;color:#f4f4f5;min-height:100vh;}
    .header{padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;}
    .logo{font-size:1rem;font-weight:800;background:linear-gradient(135deg,#6C63FF,#43E97B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .badge{background:rgba(108,99,255,.15);border:1px solid rgba(108,99,255,.25);color:#a89fff;padding:4px 12px;border-radius:20px;font-size:.78rem;}
    .msgs{max-width:720px;margin:0 auto;padding:32px 20px;}
    .msg{display:flex;gap:12px;align-items:flex-start;margin-bottom:20px;}
    .msg.user{flex-direction:row-reverse;}
    .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#6C63FF,#43E97B);display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;color:#fff;font-weight:700;}
    .bubble{max-width:78%;padding:11px 16px;border-radius:4px 14px 14px 14px;font-size:.9rem;line-height:1.7;border:1px solid rgba(255,255,255,.08);background:#1c1c1f;}
    .msg.user .bubble{border-radius:14px 14px 4px 14px;background:rgba(108,99,255,.18);border-color:rgba(108,99,255,.25);}
    .footer{text-align:center;padding:24px;color:#71717a;font-size:.82rem;}
    .footer a{color:#6C63FF;text-decoration:none;}
  </style>
</head>
<body>
<div class="header">
  <div class="logo">✦ Iqtidor AI</div>
  <span class="badge">Ulashilgan suhbat</span>
</div>
<div class="msgs">
  <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:24px;color:#a1a1aa;">{{ session.title|default:"Suhbat" }}</h2>
  {% for msg in messages %}
  <div class="msg {% if msg.role == 'user' %}user{% endif %}">
    <div class="avatar">{% if msg.role == 'user' %}U{% else %}✦{% endif %}</div>
    <div class="bubble">{{ msg.content }}</div>
  </div>
  {% endfor %}
</div>
<div class="footer">
  <a href="/">yoshiqtidorlar.uz</a> da Iqtidor AI bilan suhbatlashing
</div>
</body>
</html>
