{% extends "ai/base.html" %}
{% block ai_content %}
<h1 class="text-2xl font-bold mb-6">🧠 Iqtidor Tahlili — Mos Kasblar</h1>

<form method="post" class="bg-white rounded-xl shadow p-6 mb-6 space-y-4">
  {% csrf_token %}
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Qiziqishlaringiz</label>
    <textarea name="interests" rows="3" required
      placeholder="Masalan: matematika, ijodiy fikrlash, texnologiya, san'at..."
      class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-purple-500 outline-none"></textarea>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Yutuqlaringiz (ixtiyoriy)</label>
    <textarea name="achievements" rows="3"
      placeholder="Masalan: olimpiada g'olibi, loyiha yaratdim, kurs tugatdim..."
      class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-purple-500 outline-none"></textarea>
  </div>
  <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 font-medium">
    🤖 Kasblarni Tahlil Qil
  </button>
</form>

{% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-4 mb-4">{{ error }}</div>
{% endif %}
{% if result %}
  <div class="bg-white rounded-xl shadow p-6">
    <h2 class="font-semibold text-lg mb-3">💼 Sizga Mos Kasblar</h2>
    <div class="prose max-w-none text-gray-700 whitespace-pre-wrap">{{ result }}</div>
  </div>
{% endif %}
{% endblock %}
