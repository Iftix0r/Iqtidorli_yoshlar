{% extends "ai/base.html" %}
{% block ai_content %}
<h1 class="text-2xl font-bold mb-6">🎯 AI Mentor — Shaxsiy O'quv Yo'l Xaritasi</h1>

<form method="post" class="bg-white rounded-xl shadow p-6 mb-6 space-y-4">
  {% csrf_token %}
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Soha / Yo'nalish</label>
    <input type="text" name="field" value="{{ field }}" required
      placeholder="Masalan: Web dasturlash, Dizayn, Data Science..."
      class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Daraja</label>
    <select name="level" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
      <option value="boshlang'ich">Boshlang'ich</option>
      <option value="o'rta">O'rta</option>
      <option value="yuqori">Yuqori</option>
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Maqsad (ixtiyoriy)</label>
    <input type="text" name="goal" placeholder="Masalan: 6 oyda ish topish, freelance boshlash..."
      class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
  </div>
  <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 font-medium">
    🤖 Yo'l Xaritasini Tuz
  </button>
</form>

{% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-4 mb-4">{{ error }}</div>
{% endif %}
{% if result %}
  <div class="bg-white rounded-xl shadow p-6">
    <h2 class="font-semibold text-lg mb-3">📚 Sizning O'quv Yo'l Xaritangiz</h2>
    <div class="prose max-w-none text-gray-700 whitespace-pre-wrap">{{ result }}</div>
  </div>
{% endif %}
{% endblock %}
