<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Sahifa topilmadi</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6C63FF;
            --bg: #0F0E17;
            --text: #FFFFFE;
            --muted: #A7A9BE;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(135deg, #6C63FF, #43E97B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        h1 { font-size: 2rem; margin: 20px 0 10px; }
        p { color: var(--muted); margin-bottom: 30px; font-size: 1.1rem; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3);
        }
        .back-icons {
            position: absolute;
            z-index: -1;
            opacity: 0.05;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Voy! Sahifa topilmadi</h1>
        <p>Siz qidirayotgan sahifa mavjud emas yoki boshqa manzilga ko'chirilgan.</p>
        <a href="/" class="btn">
            <i data-lucide="home"></i> Asosiy sahifaga qaytish
        </a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
