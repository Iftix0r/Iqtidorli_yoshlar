{% extends "tizim/base.html" %}
{% block content %}
<h1 class="text-xl font-bold mb-6">🗄️ Kesh Boshqaruvi</h1>

<div class="bg-white rounded-xl shadow p-6 mb-6">
  <div class="mb-4">
    <span class="text-sm text-gray-500">Backend:</span>
    <code class="ml-2 bg-gray-100 px-2 py-1 rounded text-sm">{{ backend }}</code>
  </div>
  {% if messages %}
    {% for msg in messages %}
      <div class="bg-green-50 border border-green-200 text-green-700 rounded-lg p-3 mb-4">{{ msg }}</div>
    {% endfor %}
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="action" value="clear">
    <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700"
      onclick="return confirm('Barcha keshlarni tozalashni tasdiqlaysizmi?')">
      🗑️ Barcha Keshlarni Tozalash
    </button>
  </form>
</div>
{% endblock %}
