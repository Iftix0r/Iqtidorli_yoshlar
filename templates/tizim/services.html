{% extends "tizim/base.html" %}
{% block content %}
<h1 class="text-xl font-bold mb-6">⚙️ Server Xizmatlari</h1>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
  {% for s in services %}
  <div class="bg-white rounded-xl shadow p-5 flex items-center gap-4">
    <div class="text-3xl">
      {% if s.status == 'active' %}✅{% elif s.status == 'inactive' %}❌{% else %}⚪{% endif %}
    </div>
    <div>
      <div class="font-semibold">{{ s.label }}</div>
      <div class="text-sm text-gray-500">{{ s.name }}</div>
      <span class="inline-block mt-1 px-2 py-0.5 rounded text-xs font-medium
        {% if s.status == 'active' %}bg-green-100 text-green-700
        {% elif s.status == 'inactive' %}bg-red-100 text-red-700
        {% else %}bg-gray-100 text-gray-600{% endif %}">
        {{ s.status }}
      </span>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
