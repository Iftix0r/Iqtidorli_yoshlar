{% extends 'base.html' %}
{% block title %}Tanlov Qo'shish{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <h2>Yangi <span>Tanlov Qo'shish</span></h2>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="form-group">
          <label>{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="field-error">{{ field.errors.0 }}</div>{% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn-primary" style="width:100%;justify-content:center;">Qo'shish</button>
    </form>
    <p class="auth-link"><a href="{% url 'contests' %}">← Tanlovlarga qaytish</a></p>
  </div>
</section>
{% endblock %}
