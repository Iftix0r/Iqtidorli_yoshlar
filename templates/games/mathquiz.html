{% extends "base.html" %}
{% block title %}Math Quiz{% endblock %}
{% block content %}
<section style="padding-top:90px;padding-bottom:40px;">
<div style="max-width:500px;margin:0 auto;padding:0 20px;text-align:center;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <a href="{% url 'games' %}" class="btn-outline" style="padding:6px 14px;font-size:.82rem;"><i data-lucide="arrow-left"></i></a>
    <h2 style="font-size:1.3rem;font-weight:800;">🔢 Math Quiz</h2>
    <div style="font-size:.9rem;font-weight:700;color:var(--primary);">Ball: <span id="score">0</span></div>
  </div>

  <div style="display:flex;gap:12px;justify-content:center;margin-bottom:20px;">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;">⏱ <span id="timer">30</span>s</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;">Savol: <span id="qnum">0</span>/10</div>
  </div>

  <div id="question" style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;font-size:2rem;font-weight:900;margin-bottom:20px;min-height:100px;display:flex;align-items:center;justify-content:center;">
    Boshlash tugmasini bosing
  </div>

  <div id="options" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;"></div>
  <div id="msg" style="font-size:.95rem;min-height:24px;margin-bottom:12px;"></div>
  <button onclick="startGame()" id="startBtn" class="btn-primary" style="padding:10px 28px;">▶ Boshlash</button>
</div>
</section>
<script>
let score=0,qnum=0,timer,running=false,answered=false;
const OPS=['+','-','×','÷'];

function startGame(){
  score=0;qnum=0;
  document.getElementById('score').textContent=0;
  document.getElementById('msg').textContent='';
  document.getElementById('startBtn').textContent='↺ Qayta';
  running=true;
  nextQ();
  let t=30;
  document.getElementById('timer').textContent=t;
  if(timer)clearInterval(timer);
  timer=setInterval(()=>{
    t--;document.getElementById('timer').textContent=t;
    if(t<=0){clearInterval(timer);endGame();}
  },1000);
}

function nextQ(){
  if(qnum>=10){endGame();return;}
  answered=false;
  qnum++;
  document.getElementById('qnum').textContent=qnum;
  const op=OPS[Math.floor(Math.random()*OPS.length)];
  let a,b,ans;
  if(op==='+'){a=rnd(1,50);b=rnd(1,50);ans=a+b;}
  else if(op==='-'){a=rnd(10,99);b=rnd(1,a);ans=a-b;}
  else if(op==='×'){a=rnd(2,12);b=rnd(2,12);ans=a*b;}
  else{a=rnd(1,12);b=rnd(1,12);ans=a;a=ans*b;}
  document.getElementById('question').textContent=`${a} ${op} ${b} = ?`;
  const opts=shuffle([ans,...new Set([ans+rnd(1,5),ans-rnd(1,5),ans+rnd(6,15),ans*2].filter(v=>v>0&&v!==ans))].slice(0,3));
  const d=document.getElementById('options');
  d.innerHTML='';
  opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.textContent=o;
    btn.style.cssText='padding:14px;border-radius:12px;background:var(--card);border:2px solid var(--border);color:var(--text);font-size:1.1rem;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit;';
    btn.onmouseover=()=>{if(!answered)btn.style.borderColor='var(--primary)';};
    btn.onmouseout=()=>{if(!answered)btn.style.borderColor='var(--border)';};
    btn.onclick=()=>check(o,ans,btn);
    d.appendChild(btn);
  });
}

function check(val,ans,btn){
  if(answered)return;
  answered=true;
  if(val===ans){
    score+=10;document.getElementById('score').textContent=score;
    btn.style.background='rgba(67,233,123,.2)';btn.style.borderColor='#43E97B';
    document.getElementById('msg').textContent='✅ To\'g\'ri! +10';
  } else {
    btn.style.background='rgba(255,101,132,.2)';btn.style.borderColor='#FF6584';
    document.getElementById('msg').textContent=`❌ Noto'g'ri! Javob: ${ans}`;
  }
  setTimeout(nextQ,800);
}

function endGame(){
  running=false;clearInterval(timer);
  document.getElementById('question').textContent=`🏁 Tugadi! Ball: ${score}`;
  document.getElementById('options').innerHTML='';
  document.getElementById('msg').textContent='';
  {% if user.is_authenticated %}saveScore('math',score);{% endif %}
}

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){return a.sort(()=>Math.random()-.5);}

{% if user.is_authenticated %}
async function saveScore(game,score){
  await fetch('/games/score/',{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token }}'},body:JSON.stringify({game,score})});
}
{% endif %}
</script>
{% endblock %}
