{% extends "base.html" %}
{% block title %}2048{% endblock %}
{% block content %}
<section style="padding-top:90px;padding-bottom:40px;">
<div style="max-width:460px;margin:0 auto;padding:0 20px;text-align:center;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <a href="{% url 'games' %}" class="btn-outline" style="padding:6px 14px;font-size:.82rem;"><i data-lucide="arrow-left"></i></a>
    <h2 style="font-size:1.3rem;font-weight:800;">🧩 2048</h2>
    <div style="font-size:.9rem;font-weight:700;color:var(--primary);">Ball: <span id="score">0</span></div>
  </div>
  <div id="board" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:var(--card);border-radius:16px;padding:12px;border:1px solid var(--border);touch-action:none;"></div>
  <div id="msg" style="margin-top:14px;font-size:1rem;color:var(--muted);min-height:24px;"></div>
  <button onclick="init()" class="btn-primary" style="margin-top:10px;padding:9px 24px;">↺ Yangi o'yin</button>
</div>
</section>
<style>
.tile{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.4rem;transition:all .1s;}
</style>
<script>
const COLORS={0:'#1a1a2e',2:'#6C63FF',4:'#4facfe',8:'#43E97B',16:'#38F9D7',32:'#FF9A44',64:'#FF6584',128:'#FFD700',256:'#f093fb',512:'#f5576c',1024:'#4facfe',2048:'#43E97B'};
let grid,score;
function init(){
  grid=Array(4).fill(null).map(()=>Array(4).fill(0));
  score=0; document.getElementById('score').textContent=0;
  document.getElementById('msg').textContent='';
  add(); add(); render();
}
function add(){
  const empty=[];
  grid.forEach((r,i)=>r.forEach((v,j)=>{if(!v)empty.push([i,j]);}));
  if(!empty.length)return;
  const [i,j]=empty[Math.floor(Math.random()*empty.length)];
  grid[i][j]=Math.random()<.9?2:4;
}
function render(){
  const b=document.getElementById('board');
  b.innerHTML='';
  grid.forEach(r=>r.forEach(v=>{
    const d=document.createElement('div');
    d.className='tile';
    d.style.background=COLORS[v]||'#6C63FF';
    d.style.color=v<=4?'#fff':'#fff';
    d.style.fontSize=v>=1000?'1rem':v>=100?'1.2rem':'1.4rem';
    d.textContent=v||'';
    b.appendChild(d);
  }));
}
function move(dir){
  let moved=false;
  const rotate=g=>g[0].map((_,i)=>g.map(r=>r[i]).reverse());
  let g=JSON.parse(JSON.stringify(grid));
  if(dir==='up')g=rotate(rotate(rotate(g)));
  if(dir==='left')g=rotate(rotate(g));
  if(dir==='right'){}
  // Slide right
  g=g.map(row=>{
    let r=row.filter(v=>v);
    for(let i=r.length-1;i>0;i--){if(r[i]===r[i-1]){r[i]*=2;score+=r[i];r[i-1]=0;}}
    r=r.filter(v=>v);
    while(r.length<4)r.unshift(0);
    return r;
  });
  if(dir==='up')g=rotate(g);
  if(dir==='left')g=rotate(rotate(g));
  if(JSON.stringify(g)!==JSON.stringify(grid)){moved=true;grid=g;}
  if(moved){add();document.getElementById('score').textContent=score;render();}
  // Win/lose check
  if(grid.some(r=>r.includes(2048))){
    document.getElementById('msg').textContent='🎉 2048 ga yetdingiz!';
    {% if user.is_authenticated %}saveScore('2048',score);{% endif %}
  } else if(!grid.some(r=>r.includes(0))&&!canMove()){
    document.getElementById('msg').textContent=`O'yin tugadi! Ball: ${score}`;
    {% if user.is_authenticated %}saveScore('2048',score);{% endif %}
  }
}
function canMove(){
  for(let i=0;i<4;i++)for(let j=0;j<4;j++){
    if(j<3&&grid[i][j]===grid[i][j+1])return true;
    if(i<3&&grid[i][j]===grid[i+1][j])return true;
  }return false;
}
document.addEventListener('keydown',e=>{
  const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};
  if(m[e.key]){move(m[e.key]);e.preventDefault();}
});
let tx,ty;
document.getElementById('board')?.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
},{passive:true});
{% if user.is_authenticated %}
async function saveScore(game,score){
  await fetch('/games/score/',{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token }}'},body:JSON.stringify({game,score})});
}
{% endif %}
init();
</script>
{% endblock %}
